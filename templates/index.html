<!DOCTYPE html>
<html>
<head>
    <title>AI Image Classifier</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        .container {
            background: white;
            width: 420px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        img {
            margin-top: 20px;
            width: 200px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #007bff;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>AI Image Classifier</h1>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Predict</button>
    </form>

    {% if image %}
        <img src="{{ image }}">
    {% endif %}

    {% if results %}
        <div class="result">
            <h3>Top Predictions:</h3>
            {% for label, prob in results %}
                <p>{{ label }} : {{ prob }}%</p>
            {% endfor %}
        </div>
    {% endif %}

</div>

</body>
</html>
